<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center px-6">

    <div class="w-full max-w-md">

        <div class="text-center mb-8">

            <h1 class="text-4xl font-bold text-slate-900">
                🔐 SecuPass
            </h1>

            <p class="text-slate-500 mt-2">
                Create your secure vault account
            </p>

        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8">

            <h2 class="text-2xl font-bold text-center mb-6">
                Register
            </h2>

            <form method="POST" class="space-y-5">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                    class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                >

                <input
                    type="email"
                    name="email"
                    placeholder="Email Address"
                    required
                    class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                    class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                >

                <button
                    type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition"
                >
                    Create Account
                </button>

            </form>

            <div class="text-center mt-6">

                <p class="text-slate-600">
                    Already have an account?
                </p>

                <a
                    href="login.html"
                    class="text-blue-600 font-semibold hover:text-blue-800"
                >
                    Sign In
                </a>

            </div>

        </div>

    </div>

</body>
</html>
